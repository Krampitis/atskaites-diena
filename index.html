<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --paper: #f6f2e9;
  --ink: #16130d;
  --muted: #8a8474;
  --accent: #b5402f;
}

body {
  background: var(--paper);
  color: var(--ink);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  font-family: 'Inter', system-ui, sans-serif;
  font-variant-numeric: tabular-nums;
}

.sheet { text-align: center; width: 100%; max-width: 720px; }

.kicker {
  font-size: 11px;
  letter-spacing: 5px;
  text-indent: 5px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 32px;
}

.days {
  font-weight: 500;
  font-size: clamp(64px, 18vw, 140px);
  line-height: 1;
  letter-spacing: -0.01em;
  text-indent: -0.01em;
}

.days-label {
  font-size: 13px;
  letter-spacing: 3px;
  text-indent: 3px;
  text-transform: uppercase;
  color: var(--muted);
  margin-top: 12px;
}

.clock {
  font-weight: 400;
  font-size: clamp(18px, 4.5vw, 26px);
  letter-spacing: 3px;
  text-indent: 3px;
  color: var(--ink);
  margin-top: 22px;
}
.clock .sec { color: var(--accent); }

hr {
  border: none;
  border-top: 1px solid var(--ink);
  width: 64px;
  margin: 36px auto 0;
}

.units {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  max-width: 420px;
  margin: 30px auto 0;
}
.unit b {
  display: block;
  font-weight: 500;
  font-size: clamp(20px, 5vw, 28px);
}
.unit span {
  display: block;
  margin-top: 8px;
  font-size: 11px;
  letter-spacing: 2px;
  text-indent: 2px;
  text-transform: uppercase;
  color: var(--muted);
}

.start {
  margin-top: 36px;
  font-size: 12px;
  color: var(--muted);
  letter-spacing: 1px;
  text-indent: 1px;
}
.start b {
  font-weight: 400;
  color: var(--ink);
  letter-spacing: 1px;
}
</style>
<script data-goatcounter="https://pi314159.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
</head>
